<!DOCTYPE html>
<html lang="en">
<head>
    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM-shop | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>



    <header class="navbar">
        <div class="logo">IM-<span>shop</span></div>
        
        <div class="nav-right">
            <div id="auth-section">
                <button id="login-btn" class="btn-primary"><i class="fab fa-google"></i> Login</button>
                <div id="user-profile" class="hidden">
                    <img id="user-pic" src="" alt="User">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            
            <div class="cart-btn" id="cart-btn">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-badge">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Lifestyle</h1>
            <p>আমাদের প্রিমিয়াম কালেকশন থেকে আপনার পছন্দের পণ্যটি বেছে নিন।</p>
            <a href="#products" class="btn-shop">Shop Now</a>
        </div>
    </section>

    <main class="container" id="products">
        <h2 class="section-title">পছন্দের পণ্যসমূহ</h2>
        <div class="product-grid" id="product-grid">
            <div class="loader">Loading Products...</div>
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay">
        <aside class="cart-sidebar">
            <button class="close-cart" id="close-cart">&times;</button>
            <h2 class="cart-title">Your Cart</h2>
            <div class="cart-items" id="cart-items">
                </div>
            <div class="cart-footer">
                <div class="total-div">
                    <span>Total:</span>
                    <span>৳ <span id="cart-total">0</span></span>
                </div>
                <button class="checkout-btn">Checkout Now</button>
            </div>
        </aside>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
