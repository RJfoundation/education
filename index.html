<div class="video-container">

    id="customVideoPlayer" 
    controls 
    preload="metadata" 
    poster="thumbnail.jpg" 
    playsinline 
    aria-label="এখানে ভিডিওর একটি বিবরণ দিন"

    <!-- ব্রাউজারে ভিডিও সাপোর্ট না করলে ফলব্যাক মেসেজ এবং ডাউনলোড লিঙ্ক -->
    <p>
      দুঃখিত, আপনার ব্রাউজার এই ভিডিওটি সাপোর্ট করছে না। 
      আপনি চাইলে <a href="rjf.mp4" download>ভিডিওটি ডাউনলোড</a> করে দেখতে পারেন।
    </p>
  </video>
